{% load i18n %}
<form
  hx-post="{% url 'create_permit' %}"
  hx-target="#permit-list-wrapper"
  hx-swap="outerHTML"
  hx-indicator="#spinner"
>
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label fw-semibold">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
      {% endif %}
    </div>
  {% endfor %}
  {% if form.non_field_errors %}
    <div class="alert alert-danger py-2">{{ form.non_field_errors|join:", " }}</div>
  {% endif %}
  <button type="submit" class="btn btn-dark w-100">
    <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
    Crea e invia email
  </button>
</form>

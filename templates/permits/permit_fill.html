{% extends "base.html" %}
{% load i18n %}

{% block title %}Compila il permesso{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4">
      <h4 class="fw-bold mb-1">Autorizzazione al transito</h4>
      <p class="text-muted small mb-4">
        Valido dal <strong>{{ permit.valid_from|date:"d/m/Y" }}</strong>
        al <strong>{{ permit.valid_to|date:"d/m/Y" }}</strong>
      </p>

      <div id="form-section">
        {% include "permits/partials/fill_form.html" %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
